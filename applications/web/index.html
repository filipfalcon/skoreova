    <!-- Structured data for search engines and AI agents. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "NewsMediaOrganization",
            "@id": "https://beta.skoreova.com/#organization",
            "name": "Skóreová",
            "url": "https://beta.skoreova.com/",
            "logo": "https://beta.skoreova.com/icon-512.png",
            "description": "Independent coverage of Czech women’s football.",
            "sameAs": [
              "https://instagram.com/skoreova",

              "https://youtube.com/@skoreova",
              "https://threads.net/@skoreova",
              "https://facebook.com/skoreova",
              "https://x.com/skoreova"
            ]
          },
          {
            "@type": "WebSite",
            "@id": "https://beta.skoreova.com/#website",
            "url": "https://beta.skoreova.com/",
            "name": "Skóreová",
            "publisher": { "@id": "https://beta.skoreova.com/#organization" },
            "inLanguage": "en"
          }
        ]
      }
    </script>
    <!-- Consent Mode v2. ORDER IS VITAL (see Google's implementation
         example): the consent DEFAULT must run before the loader and any
         config. Everything starts denied; a stored earlier choice is
         re-applied immediately, otherwise the banner at the end of <body>
         asks. Ad parameters stay denied forever — this site runs no ads. -->
    <script>
      // Measurement runs ONLY on the production hostnames (.com is
      // canonical, .cz is the alias — both are live deploys) — everything
      // else (localhost, LAN phone testing, preview deploys, tunnels) hits
      // Google's official kill switch: gtag.js loads but records nothing.
      window.skoreovaAnalyticsOff = !['beta.skoreova.com', 'beta.skoreova.cz'].includes(
        location.hostname,
      );
      if (window.skoreovaAnalyticsOff) {
        window['ga-disable-G-PJ131P52RX'] = true;
      }

      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
      });
      gtag('set', 'ads_data_redaction', true);
      try {
        if (localStorage.getItem('skoreova-consent') === 'granted') {
          gtag('consent', 'update', { analytics_storage: 'granted' });
        }
      } catch (ignored) {}
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PJ131P52RX"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-PJ131P52RX');
    </script>
    <link href="/src/styles.css" rel="stylesheet" />
    <title>Skóreová — Czech Women’s Football</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/entry.ts"></script>
    <!-- Cookie consent banner. Lives OUTSIDE the Foldkit root on purpose:
         it must survive route changes, fire gtag consent updates (a side
         effect the Elm model shouldn't own), and keep working even if the
         app fails to boot. Styled inline with the brand tokens so it never
         depends on the app bundle. -->
    <aside id="cookie-consent" aria-label="Cookie consent" hidden>
      <!-- The link's target is a placeholder — no policy page exists yet
           (falls through to the app's not-found route). -->
      <p class="cookie-consent-copy">
        We use cookies to get better. <a href="/policy">Learn more</a> about the usage.
      </p>
      <div class="cookie-consent-actions">
        <button type="button" id="cookie-consent-accept">Accept</button>
        <button type="button" id="cookie-consent-decline">Decline</button>
      </div>
    </aside>
    <style>
      /* On phones the banner is a full-width strip dropping in from under
         the fixed header: pinned just below it (top = the header's h-14) and
         stacked UNDER it (z-index 40 < the header's z-50), so the slide reads
         as emerging from beneath the bar. It also stamps `.has-cookie-banner`
         + `--cookie-banner-h` on <html> (see the script below) and the app's
         hero photo yields by exactly that height — the shift lives in
         styles.css. From sm up it sits bottom-left as a card. */
      #cookie-consent {
        position: fixed;
        /* Below the menu overlay (z-40) and the header (z-50): the menu must
           cover the banner, and the banner slides out from under the bar. */
        z-index: 30;
        top: 3.5rem;
        left: 0;
        width: 100%;
        padding: 0.875rem 1.25rem;
        /* Full paper on top — the dividing line against the header's black;
           the soft bottom edge stays subtle against the photo. */
        border-top: 1px solid #f3efe8;
        border-bottom: 1px solid rgba(243, 239, 232, 0.25);
        background: #0d0c0c;
        color: #f3efe8;
        font-family: 'Archivo Variable', 'Helvetica Neue', Arial, sans-serif;
        animation: cookie-consent-drop 1.1s cubic-bezier(0.6, 0, 0.3, 1);
      }

      @media (min-width: 640px) {
        #cookie-consent {
          top: auto;
          bottom: 1.25rem;
          left: 1.25rem;
          width: fit-content;
          max-width: calc(100vw - 1.5rem);
          padding: 0.875rem;
          border: 1px solid rgba(243, 239, 232, 0.25);
          animation: cookie-consent-in 0.7s cubic-bezier(0.6, 0, 0.3, 1);
        }
      }

      /* Closing mirrors the entrance — the strip tucks back under the
         header, the card sinks away. Dedicated keyframes, NOT the entrance
         ones with `reverse`: the entrance animation has already finished, and
         only a new animation-name restarts the engine and fires the
         animationend the script waits for before flipping `hidden`. `both`
         holds the off-screen end state until then. */
      #cookie-consent.is-closing {
        animation: cookie-consent-drop-out 1.1s cubic-bezier(0.6, 0, 0.3, 1) both;
      }

      @media (min-width: 640px) {
        #cookie-consent.is-closing {
          animation: cookie-consent-out 0.7s cubic-bezier(0.6, 0, 0.3, 1) both;
        }
      }

      @keyframes cookie-consent-drop-out {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-100%);
        }
      }

      @keyframes cookie-consent-out {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(1.5rem);
        }
      }

      /* Phone entrance — no fade: -100% tucks the whole card into the strip
         the opaque header covers (plus off-screen above), so it's a pure
         slide out from under the bar. */
      @keyframes cookie-consent-drop {
        from {
          transform: translateY(-100%);
        }
        to {
          transform: translateY(0);
        }
      }

      @keyframes cookie-consent-in {
        from {
          opacity: 0;
          transform: translateY(1.5rem);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #cookie-consent,
        #cookie-consent.is-closing {
          animation: none;
        }
      }

      .cookie-consent-copy {
        margin: 0;
        /* One line at every width: the size tracks the viewport (the whole
           uppercase sentence measures ~38.4em at this tracking, the strip's
           side padding 2.5rem) and caps at 14px once there's room. */
        font-size: min(0.875rem, calc((100vw - 2.75rem) / 39));
        letter-spacing: 0.08em;
        line-height: 1.5;
        text-align: center;
        text-transform: uppercase;
        white-space: nowrap;
        color: #f3efe8;
      }

      /* The policy link inside the copy — same muted paper as the sentence,
         marked only by a hairline pink underline. */
      .cookie-consent-copy a {
        color: inherit;
        text-decoration: underline;
        text-decoration-color: #ff2f8e;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
        transition: color 0.3s;
      }

      .cookie-consent-copy a:hover,
      .cookie-consent-copy a:active {
        color: #ff2f8e;
      }

      /* Two equal columns (ACCEPT / DECLINE share one width and height),
         capped and auto-margined so the pair sits centered. */
      .cookie-consent-actions {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
        max-width: 18rem;
        margin: 0.75rem auto 0;
      }

      .cookie-consent-actions button {
        cursor: pointer;
        padding: 0.4375rem 0.875rem;
        border: 1px solid transparent;
        font-family: 'Anton', 'Arial Narrow', sans-serif;
        font-size: 0.8125rem;
        line-height: 1.2;
        letter-spacing: 0.02em;
        text-align: center;
        text-transform: uppercase;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      #cookie-consent-accept {
        background: #ff2f8e;
        color: #0d0c0c;
      }

      #cookie-consent-accept:hover,
      #cookie-consent-accept:active {
        background: #f3efe8;
      }

      #cookie-consent-decline {
        border-color: #f3efe8;
        background: transparent;
        color: #f3efe8;
      }

      #cookie-consent-decline:hover,
      #cookie-consent-decline:active {
        border-color: #f3efe8;
        background: #f3efe8;
        color: #0d0c0c;
      }
    </style>
    <script>
      (function () {
        var KEY = 'skoreova-consent';
        var banner = document.getElementById('cookie-consent');
        var stored = null;
        try {
          stored = localStorage.getItem(KEY);
        } catch (ignored) {}

        // Hides the banner once the slide-out lands. Registered per close()
        // and removed on both paths — a reopen mid-slide-out must detach it,
        // or the ENTRANCE animation's end would hide the banner again.
        var finishClose = function () {
          banner.removeEventListener('animationend', finishClose);
          banner.hidden = true;
          banner.classList.remove('is-closing');
        };

        // Shows the banner and tells the app about it: the class + height
        // variable on <html> drive the hero-photo shift on phones (the rule
        // lives in styles.css, next to the other hero styles).
        var show = function () {
          finishClose();
          banner.hidden = false;
          document.documentElement.style.setProperty(
            '--cookie-banner-h',
            banner.offsetHeight + 'px',
          );
          document.documentElement.classList.add('has-cookie-banner');
        };

        var close = function (choice) {
          if (banner.classList.contains('is-closing')) return;
          try {
            localStorage.setItem(KEY, choice);
          } catch (ignored) {}
          // The photo starts its return the moment the slide-out starts —
          // the two run on matching timings.
          document.documentElement.classList.remove('has-cookie-banner');
          banner.classList.add('is-closing');
          if (getComputedStyle(banner).animationName === 'none') {
            // Reduced motion — there is no slide-out to wait for.
            finishClose();
            return;
          }
          banner.addEventListener('animationend', finishClose);
        };

        document.getElementById('cookie-consent-accept').addEventListener('click', function () {
          gtag('consent', 'update', { analytics_storage: 'granted' });
          close('granted');
        });

        document.getElementById('cookie-consent-decline').addEventListener('click', function () {
          // Also the revocation path: reopened from the footer after a
          // previous grant, this flips analytics back off.
          gtag('consent', 'update', { analytics_storage: 'denied' });
          close('denied');
        });

        if (stored !== 'granted' && stored !== 'denied') {
          // Enter only after the hero's intro has fully played out. The photo
          // settle (keyframes `hero-photo`, 2.4s) is its longest beat and the
          // corner captions land ~0.2s later, so wait for the settle's end
          // plus a small breath. The timer is the fallback for pages without
          // a hero, reduced motion (animation: none — the event never fires),
          // or a failed app boot.
          var shown = false;
          var reveal = function () {
            if (shown) return;
            shown = true;
            show();
          };
          document.addEventListener('animationend', function (event) {
            if (event.animationName === 'hero-photo') setTimeout(reveal, 500);
          });
          setTimeout(reveal, 4000);
        }

        // The app's footer renders a plain "#cookie-settings" link — catch
        // it here and reopen the banner so a choice can be changed anytime.
        document.addEventListener('click', function (event) {
          var target =
            event.target instanceof Element
              ? event.target.closest("a[href='#cookie-settings']")
              : null;
          if (!target) return;
          event.preventDefault();
          // Reopening IS the reset: drop the stored choice so the banner
          // also comes back after a refresh, until a new choice is made.
          try {
            localStorage.removeItem(KEY);
          } catch (ignored) {}
          show();
        });
      })();
    </script>
  </body>
</html>
